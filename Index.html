<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Cloud Android</title>
    <style>
        /* This makes the website layout completely normal and clean */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #121212;
            font-family: system-ui, sans-serif;
        }
        /* The emulator frame completely fills the website naturally */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        .loading-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #aaaaaa;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="loading-text" id="status">Connecting to Cloud Phone...</div>
    <iframe id="cloudScreen" src=""></iframe>

    <script>
        // CHANGE THIS: Put your secret custom subdomain keyword here!
        const SUBDOMAIN = "mycoolphone77"; 

        // Automatically connects securely using your hidden password configuration
        const targetUrl = `https://${SUBDOMAIN}.localhost.run?password=password123&autoconnect=true&resize=scale`;
        
        const iframe = document.getElementById('cloudScreen');
        const statusText = document.getElementById('status');

        iframe.src = targetUrl;

        // Hide the loading text once the page structure connects
        iframe.onload = function() {
            statusText.style.display = 'none';
        };
    </script>
</body>
</html>
