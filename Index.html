<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Android Emulator</title>
    <style>
        body { margin: 0; padding: 0; background: #222; color: #fff; font-family: sans-serif; text-align: center; }
        iframe { width: 100vw; height: 85vh; border: none; background: #000; }
        .controls { padding: 10px; }
        input { padding: 8px; width: 60%; max-width: 300px; border-radius: 4px; border: none; }
        button { padding: 8px 15px; background: #24292e; color: white; border: 1px solid #fff; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="controls">
        <h3>Connect to your GitHub Actions Cloud Emulator</h3>
        <input type="text" id="tunnelUrl" placeholder="Paste the Web URL from your Action log here...">
        <button onclick="connectEmulator()">Connect</button>
    </div>
    <iframe id="emulatorScreen" src=""></iframe>

    <script>
        function connectEmulator() {
            let url = document.getElementById('tunnelUrl').value.trim();
            if (url) {
                // Attach the vnc password to bypass login prompts on your phone
                if (!url.includes('?')) {
                    url += '?password=password123';
                }
                document.getElementById('emulatorScreen').src = url;
            }
        }
    </script>
</body>
</html>
