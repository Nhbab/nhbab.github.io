name: GTV14 Android TV (Clean 1 Hour noVNC)

on:
  workflow_dispatch:

jobs:
  run-1hour-tv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install QEMU, noVNC, and Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils wget adb novnc websockify

      - name: Download GTV14 Android TV ISO
        run: |
          echo "Downloading ISO using browser bypass..."
          curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -o gtv14_atv.iso \
            "https://sourceforge.net"

      - name: Provision Storage Drive
        run: |
          qemu-img create -f qcow2 gtv14_disk.qcow2 12G

      - name: Launch GTV14 in QEMU (Isolated Monitor Port)
        run: |
          echo "Starting QEMU with a dedicated local network port for clean controls..."
          sudo qemu-system-x86_64 \
            -enable-kvm \
            -cpu host \
            -m 4G \
            -smp 2 \
            -drive file=gtv14_disk.qcow2,format=qcow2 \
            -cdrom gtv14_atv.iso \
            -vga virtio \
            -display none \
            -vnc 127.0.0.1:0 \
            -net nic,model=virtio \
            -net user,hostfwd=tcp::5555-:5555 \
            -monitor telnet:127.0.0.1:4444,server,nowait \
            -daemonize

      - name: Clean GRUB Boot Selection
        run: |
          echo "Waiting 10 seconds for the boot screen to completely settle..."
          sleep 10
          
          echo "Injecting return key via Python socket interface..."
          python3 -c '
          import socket, time
          s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          s.connect(("127.0.0.1", 4444))
          time.sleep(0.5)
          s.sendall(b"\n\nsendkey ret\n")
          time.sleep(0.5)
          s.close()
          '
          echo "Boot selection delivered cleanly."

      - name: Start Websockify (VNC to WebSockets)
        run: |
          websockify --web /usr/share/novnc/ 6080 127.0.0.1:5900 &
          sleep 2

      - name: Generate Public Remote Link and Hold for 1 Hour
        run: |
          echo "================================================================"
          echo "LAUNCHING TUNNEL ENGINE..."
          echo "================================================================"
          
          # Force Pinggy to save all its log output into an internal text file (pinggy.log)
          ssh -o StrictHostKeyChecking=no -R 80:localhost:6080 a.pinggy.io > pinggy.log 2>&1 &
          
          # Wait 8 seconds for the network link to establish completely
          sleep 8
          
          echo "================================================================"
          echo "--> YOUR ONLINE VIRTUAL MACHINE REMOTE DETAILS <--"
          echo "================================================================"
          
          # Read the log file, find the generated web URL, and print it cleanly to the console
          grep -o 'https://[^ ]*\(pinggy.link\|pinggy.io\)' pinggy.log || cat pinggy.log
          
          echo ""
          echo "INSTRUCTIONS:"
          echo "1. Click the .pinggy.link URL printed directly above."
          echo "2. On the web page that opens, click on 'vnc.html'."
          echo "3. Use your computer keyboard ARROW KEYS to steer Up/Down/Left/Right!"
          echo "================================================================"
          
          # Keep alive for 1 hour
          sleep 3600
