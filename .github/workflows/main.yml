name: Android 11 Fast 1 Hour VM

on:
  workflow_dispatch:

jobs:
  run-android11-vm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install QEMU, noVNC, and Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils wget adb novnc websockify

      - name: Download Android 11 x64 ISO from Archive.org
        run: |
          echo "Downloading stable Android 11 binary block..."
          curl -L -A "Mozilla/5.0" \
            -o "Android 11 x64 (User).iso" \
            "https://archive.org/download/androidx86-11-isos/Android%2011%20x64%20%28User%29.iso"

      - name: Provision Storage Drive
        run: |
          qemu-img create -f qcow2 android11_disk.qcow2 16G

      - name: Launch Android 11 in QEMU (High-Performance Headless)
        run: |
          echo "Starting optimized QEMU container layout..."
          sudo qemu-system-x86_64 \
            -enable-kvm \
            -cpu host \
            -m 6G \
            -smp 4,cores=4,threads=1 \
            -drive file=android11_disk.qcow2,format=qcow2,index=0,media=disk,cache=none,aio=native \
            -drive file="Android 11 x64 (User).iso",index=1,media=cdrom,format=raw \
            -boot order=d \
            -vga virtio \
            -display none \
            -audio none \
            -vnc 127.0.0.1:0 \
            -net nic,model=virtio \
            -net user,hostfwd=tcp::5555-:5555 \
            -monitor telnet:127.0.0.1:4444,server,nowait \
            -daemonize

      - name: Fast Automated Target Drive Installation
        run: |
          echo "Waiting 8 seconds for the GRUB boot choices menu to initialize..."
          sleep 8
          
          echo "Injecting automated installation key macro sequence..."
          python3 -c '
          import socket, time
          s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          s.connect(("127.0.0.1", 4444))
          time.sleep(0.5)
          
          # Move down twice to select "Auto-Installation"
          s.sendall(b"sendkey down\n")
          time.sleep(0.5)
          s.sendall(b"sendkey down\n")
          time.sleep(0.5)
          
          # Hit Enter to process the installation loader
          s.sendall(b"sendkey ret\n")
          time.sleep(1.0)
          
          # Confirm disk wipe formatting partition selection
          s.sendall(b"sendkey ret\n")
          s.close()
          '
          echo "Macro sequence delivered. System file installation is executing..."

      - name: Start Websockify (VNC to WebSockets)
        run: |
          websockify --web /usr/share/novnc/ 6080 127.0.0.1:5900 &
          sleep 2

      - name: Generate Public Remote Link and Hold for 1 Hour
        run: |
          echo "================================================================"
          echo "LAUNCHING AUTHENTICATED TUNNEL ENGINE OVER PORT 443..."
          echo "================================================================"
          
          # Secure WebSocket mapping using your verified account token code profile
          ssh -o StrictHostKeyChecking=no -p 443 -R 80:localhost:6080 RPLfy23ckPE+80@a.pinggy.io > pinggy.log 2>&1 &
          
          sleep 10
          
          echo "================================================================"
          echo "--> YOUR ONLINE VIRTUAL MACHINE REMOTE DETAILS <--"
          echo "================================================================"
          
          # Extract and print out your clickable secure web access url link
          grep -o 'https://[^ ]*\(pinggy.link\|pinggy.io\)' pinggy.log || cat pinggy.log
          
          echo ""
          echo "INSTRUCTIONS:"
          echo "1. Click the .pinggy.link URL printed directly above."
          echo "2. On the web page that opens, click on 'vnc.html'."
          echo "3. Use your computer keyboard ARROW KEYS to steer Up/Down/Left/Right!"
          echo "================================================================"
          
          # Keeps the workflow worker open for 60 full minutes
          sleep 3600
