name: Ultimate Android TV ARM Emulator
on: 
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  run-emulator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure Cloud Kernel Virtualization (KVM)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo chmod 666 /dev/kvm

      # TRIỂN KHAI TOÀN BỘ BẰNG DOCKER: Đồng bộ mạng và khởi chạy 3 container biệt lập
      - name: Deploy Pure Docker Architecture
        run: |
          # 1. Khởi tạo một mạng nội bộ chung để các container Docker nói chuyện được với nhau
          docker network create cloud_phone_net
          
          # 2. Kích hoạt module hạt nhân cho bộ khung nền Redroid Android TV
          sudo modprobe ashmem_linux || true
          sudo modprobe binder_linux || true
          
          # 3. CONTAINER LÕI: Chạy hệ điều hành Android TV 11 siêu nhẹ
          docker run -d --privileged --name android_core \
            --network cloud_phone_net \
            --device /dev/kvm \
            redroid/redroid:11.0.0-latest \
            androidboot.hardware=redroid redroid.width=854 redroid.height=480 redroid.fps=30
            
          sleep 10
            
          # 4. CONTAINER ĐỒ HỌA: Chuyển dữ liệu màn hình Android thành giao diện điều khiển Web VNC 
          docker run -d --name web_canvas \
            --network cloud_phone_net \
            -p 6080:80 \
            -e ADB_HOST=android_core \
            -e VNC_PASSWORD=password123 \
            sorccu/adb-vnc-server
          
          sleep 10

          # 5. CONTAINER ĐƯỜNG TRUYỀN: Kéo image chính thức ngrok/ngrok và tạo đường hầm HTTPS bảo mật
          docker run -d --name ngrok_agent \
            --network cloud_phone_net \
            -e NGROK_AUTHTOKEN=rd_3FJNUZLuxuKSUetomzVf2PqUeHX \
            ngrok/ngrok:latest \
            http web_canvas:80 --domain=banister-reopen-savings.ngrok-free.dev

      - name: Maintain Server Runtime Loop
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Chu kỳ 5 tiếng 50 phút tự động kích hoạt máy chủ mới, đảm bảo hệ thống không bị ngắt quãng
          (sleep 21000 && gh workflow run "Ultimate Android TV ARM Emulator" || true) & 
          
          echo "=== PURE DOCKER EMULATOR IS ONLINE AND STREAMING ==="
          # Vòng lặp giữ máy chủ GitHub Actions luôn mở để phục vụ truyền dữ liệu
          while true; do
            docker ps
            sleep 60
          done
