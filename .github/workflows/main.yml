name: Cloud Phone Android TV
on:
  workflow_dispatch:

jobs:
  run-vm:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Virtualization and Docker
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-kvm libvirt-daemon-system libvirt-clients bridge-utils

      - name: Launch Emulator Container
        run: |
          echo "Starting Core Android Emulator..."
          docker run -d --name android-emulator \
            --device /dev/kvm \
            -e DEVICE_RES="1280x720" \
            -e SKIN="none" \
            -e EMULATOR_ARGS="-gpu swiftshader_indirect -no-audio -no-window" \
            budtmo/docker-android:emulator_11.0

      - name: Launch Web-Scrcpy Web Streamer
        run: |
          echo "Waiting 20 seconds for emulator core to initialize..."
          sleep 20
          
          echo "Starting Cloud Phone Video Streamer Engine..."
          # CHANGED IMAGE TO A VALID REPOSITORY: shmayro/scrcpy-web
          docker run -d -p 8000:8000 --name web-scrcpy \
            --privileged \
            --link android-emulator:android-emulator \
            -e ADB_SERVER_SOCKET=tcp:android-emulator:5555 \
            shmayro/scrcpy-web:latest || true

      - name: Start Free Pinggy Video Loop
        run: |
          while true; do
            echo "========================================================="
            echo "OPEN THE VIDEO STREAM LINK BELOW (VALID FOR 60 MINS):"
            echo "========================================================="
            
            ssh -p 443 \
                -o StrictHostKeyChecking=no \
                -o ServerAliveInterval=15 \
                -o ServerAliveCountMax=3 \
                -R0:localhost:8000 a.pinggy.io || true
                
            sleep 10
          done
