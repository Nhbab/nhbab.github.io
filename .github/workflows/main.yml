name: Run Flagship Cloud Android Emulator
on: workflow_dispatch 

jobs:
  run-emulator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Maximize CPU Hardware Acceleration (KVM)
        run: |
          # Set explicit read/write access to KVM virtualization hardware
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo chmod 666 /dev/kvm

      - name: Setup Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Download High-Performance Android System
        run: |
          yes | sdkmanager --sdk_root=$ANDROID_HOME --licenses
          # Using Android 29 (10.0) because it performs 3x faster on cloud runners than newer versions
          sdkmanager --sdk_root=$ANDROID_HOME "emulator" "system-images;android-29;google_apis;x86_64"

      - name: Build Virtual Device with Max RAM Allocation
        run: |
          echo "no" | avdmanager create avd -n CloudAVD -k "system-images;android-29;google_apis;x86_64" --force
          # Modifying the hardware profile to unlock performance limits
          echo "hw.ramSize=4096" >> ~/.android/avd/CloudAVD.avd/config.ini
          echo "hw.gpu.mode=host" >> ~/.android/avd/CloudAVD.avd/config.ini

      - name: Install VNC Desktop & Web Streamer
        run: |
          sudo apt-get update
          sudo apt-get install -y xfce4 xfce4-goodies tightvncserver novnc websockify
          mkdir -p ~/.vnc
          echo "password123" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd

      - name: Start Services & Persistent Network Pipe
        env:
          SUB_NAME: ${{ secrets.MY_SUBDOMAIN }}
        run: |
          # 1. Start internal desktop canvas
          vncserver :1 -geometry 1280x720 -depth 16
          
          # 2. Start HTML5 WebSocket transcoder
          /usr/share/novnc/utils/launch.sh --vnc localhost:5901 --listen 6080 &
          
          # 3. Boot Android emulator using SwiftShader multi-threaded background loops
          DISPLAY=:1 $ANDROID_HOME/emulator/emulator -avd CloudAVD -no-audio -no-boot-anim -accel on -gpu swiftshader_indirect -cores 4 -memory 4096 &
          
          # 4. Give components time to bind to open network sockets
          sleep 15
          
          # 5. FIXED: Loop prevents immediate 'exit 1' tunnel termination
          echo "=== CONNECTING SECURE TUNNEL ==="
          while true; do
            ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=15 -y -R ${SUB_NAME}:80:localhost:6080 nokey@localhost.run || true
            echo "Tunnel disconnected. Reconnecting in 5 seconds..."
            sleep 5
          done
