name: Ultimate Android TV ARM Emulator
on: 
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  run-emulator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure Cloud Kernel Virtualization (KVM)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo chmod 666 /dev/kvm

      # SỬA TẬN GỐC LỖI CURL 23: Tải vào thư mục tạm /tmp để không bị lỗi đĩa cứng hoặc quyền ghi file
      - name: Setup and Authenticate Ngrok Agent
        run: |
          curl -sSOL --output-dir /tmp https://equinox.io
          sudo tar -xzf /tmp/ngrok-v3-stable-linux-amd64.tgz -C /usr/local/bin
          rm -f /tmp/ngrok-v3-stable-linux-amd64.tgz
          ngrok config add-authtoken rd_3FJNUZLuxuKSUetomzVf2PqUeHX

      - name: Deploy Redroid Engine & Web VNC Dashboard
        run: |
          sudo modprobe ashmem_linux || true
          sudo modprobe binder_linux || true
          
          # Khởi chạy lõi Android TV 11 ARM-Translated siêu nhẹ
          docker run -d --privileged --name redroid_core \
            --device /dev/kvm \
            -p 5555:5555 \
            redroid/redroid:11.0.0-latest \
            androidboot.hardware=redroid redroid.width=960 redroid.height=540 redroid.fps=30
            
          # Khởi chạy giao diện stream màn hình Web VNC tự động kết nối vào lõi Android
          docker run -d --name web_canvas \
            -p 6080:80 \
            -e ADB_HOST=localhost \
            -e VNC_PASSWORD=password123 \
            sorccu/adb-vnc-server
          
          sleep 15

      - name: Start TV Engine & Permanent Ngrok Tunnel
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          (sleep 21000 && gh workflow run "Ultimate Android TV ARM Emulator" || true) & 

          echo "=== CONNECTING TO FIXED NGROK DOMAIN ENGINE ==="
          while true; do
            ngrok http 6080 --domain=banister-reopen-savings.ngrok-free.dev --log=stdout || true
            sleep 5
          done
