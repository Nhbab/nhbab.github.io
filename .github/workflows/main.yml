name: Linux Android 16 Build
on: 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-linux-emulator:
    # Swapped from macOS to standard Ubuntu Linux
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Enable and Run Headless Android VM
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36         # Android 16
          target: google_apis  
          arch: x86_64          # Standard Linux Intel/AMD architecture
          profile: Pixel_8     
          # Turn off hardware graphics requirements for standard Linux systems
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader -no-audio -no-boot-anim
          script: |
            echo "Android 16 Core successfully initialized on Linux Host!"
            
            # Wait for the system to fully report a responsive state
            adb wait-for-device
            
            echo "Listing verified virtual attachments:"
            adb devices
            
            echo "Extracting system properties..."
            adb shell getprop ro.build.version.release
            
            echo "Tasks executed safely. Shuts down immediately to maintain TOS compliance."
