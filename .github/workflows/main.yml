name: Ultimate Android TV ARM Emulator
on: 
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  run-emulator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure Cloud Kernel Virtualization (KVM)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo chmod 666 /dev/kvm

      - name: Clean Existing Docker Containers Cache
        run: |
          docker stop $(docker ps -aq) || true
          docker rm -f $(docker ps -aq) || true

      # SỬA LỖI MANIFEST: Thay đổi tag từ x86-11.0 thành emulator_11.0 chuẩn Docker Hub
      - name: Deploy Unified Android TV & VNC Core
        run: |
          # Khởi chạy thiết bị giả lập cấu hình dưới dạng giao diện Tivi (Sony Bravia) màn hình ngang
          docker run -d --privileged --name android_tv \
            --device /dev/kvm \
            -p 6080:6080 \
            -e EMULATOR_DEVICE="Sony Bravia 4K" \
            -e WEB_VNC=true \
            budtmo/docker-android:emulator_11.0
            
          # Đợi 30 giây để hệ thống Docker nạp phân vùng đĩa ảo Smart TV
          sleep 30

      # CONTAINER ĐƯỜNG TRUYỀN: Ngrok bám sát cổng 6080 để stream hình ảnh
      - name: Launch Ngrok Connection Agent
        run: |
          docker run -d --name ngrok_agent \
            --link android_tv:android_tv \
            ngrok/ngrok:latest \
            http android_tv:6080 --token=rd_3FJNUZLuxuKSUetomzVf2PqUeHX --domain=banister-reopen-savings.ngrok-free.dev

      - name: Maintain Server Runtime Loop
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Vòng lặp kích hoạt duy trì máy chủ chạy vô tận không giới hạn thời gian
          (sleep 21000 && gh workflow run "Ultimate Android TV ARM Emulator" || true) & 
          
          echo "=== PURE ANDROID TV DOCKER EMULATOR IS ONLINE ==="
          while true; do
            docker ps
            sleep 60
          done
