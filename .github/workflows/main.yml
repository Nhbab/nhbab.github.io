name: 📱 Run Compose Phone on GitHub

on:
  workflow_dispatch: # 👈 Tap the run button from your phone screen

jobs:
  launch-compose:
    runs-on: ubuntu-latest

    steps:
    - name: 📂 Pull Code Repo
      uses: actions/checkout@v4
      with:
        path: Android # 👈 Safely matches your 'Android' repository name

    - name: 🛠️ Load Android Kernel Drivers
      run: |
        sudo modprobe binder_linux devices="binder,hwbinder,vndbinder" || true

    - name: 🚀 Start System with Docker Compose
      run: |
        # 1. Move inside your 'Android' repository folder to prevent the missing file error
        cd Android
        
        # 2. Print files to log tracking for verification
        ls -la
        
        # 3. Pull and launch the mobile containers
        docker compose up -d

    - name: 🌐 Bind to Domain and Print Connection Link
      run: |
        cd Android
        
        echo "⏰ Waiting 10 seconds for initialization..."
        sleep 10
        echo "=========================================================="
        echo "👇 YOUR ONLINE PHONE WILL ROUTE TO:"
        echo "=========================================================="
        echo "🌐 https://biui.co.vn"
        echo "=========================================================="
        
        # Pulls live streaming status data for your visual checks
        docker compose logs public-tunnel 2>&1 | head -n 20
        
        # Keeps your GitHub action server hosting active for 6 hours
        sleep 21600
        
