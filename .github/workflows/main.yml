name: Ultimate Android TV ARM Emulator
on: 
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  run-emulator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Maximize CPU Hardware Acceleration (KVM)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo chmod 666 /dev/kvm

      - name: Setup Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK Path
        uses: android-actions/setup-android@v3

      - name: Download Android TV Image
        run: |
          sdkmanager --update
          sdkmanager "emulator" "system-images;android-30;android-tv;x86"

      - name: Build Virtual TV Hardware Profile
        run: |
          mkdir -p ~/.android/avd/CloudAVD.avd/
          cat <<EOF > ~/.android/avd/CloudAVD.avd/config.ini
          hw.cpu.arch=x86
          hw.cpu.ncore=4
          hw.ramSize=4096
          hw.gpu.mode=host
          hw.gpu.enabled=yes
          vm.heapSize=512
          image.sysdir.1=system-images/android-30/android-tv/x86/
          tag.id=android-tv
          tag.display=Android TV
          hw.keyboard=yes
          hw.mainKeys=no
          hw.lcd.density=240
          hw.lcd.height=540
          hw.lcd.width=960
          EOF
          echo "path=/home/runner/.android/avd/CloudAVD.avd" > ~/.android/avd/CloudAVD.ini
          echo "target=android-30" >> ~/.android/avd/CloudAVD.ini

      - name: Install Secure Web Streamer (noVNC) & Audio Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11vnc novnc websockify libpulse0 libgl1
          mkdir -p ~/.vnc

      - name: Install and Authenticate Ngrok
        run: |
          curl -s https://amazonaws.com | sudo gpg --dearmor -o /usr/share/keyrings/ngrok.gpg
          echo "deb [signed-by=/usr/share/keyrings/ngrok.gpg] https://amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update && sudo apt-get install -y ngrok
          
          # HARDCODED FIX: Uses your permanent token bypass value natively
          ngrok config add-authtoken rd_3FJNUZLuxuKSUetomzVf2PqUeHX

      - name: Start TV Engine & Permanent Ngrok Tunnel
        run: |
          # 1. Start headless visual canvas layout
          Xvfb :1 -screen 0 960x540x16 &
          export DISPLAY=:1
          sleep 3
          
          # 2. Start VNC connection engine
          x11vnc -display :1 -nopw -listen localhost -shared -forever &
          sleep 3
          
          # 3. Expose the visual elements using websockify natively
          python3 -m websockify --web /usr/share/novnc/ 6080 localhost:5900 &
          sleep 3
          
          # 4. Invoke Android TV emulator execution layers
          $ANDROID_HOME/emulator/emulator -avd CloudAVD -no-audio -no-sound -no-window -no-boot-anim -accel on -gpu swiftshader_indirect -cores 4 -memory 4096 -qemu -cpu host &
          sleep 15
          
          # 5. Continuous execution loop triggers next run before timeout thresholds
          (sleep 21000 && gh workflow run "Ultimate Android TV ARM Emulator") & 

          # 6. HARDCODED FIX: Points securely to your exact reserved ngrok domain layout parameters
          echo "=== CONNECTING TO FIXED NGROK DOMAIN ENGINE ==="
          while true; do
            ngrok http 6080 --domain=banister-reopen-savings.ngrok-free.dev --log=stdout || true
            sleep 5
          done
