name: Run Cloud Android Emulator
on: workflow_dispatch 

jobs:
  run-emulator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Enable KVM Hardware Acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Java and Android SDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Android Emulator Tools
        run: |
          yes | sdkmanager --sdk_root=$ANDROID_HOME --licenses
          sdkmanager --sdk_root=$ANDROID_HOME "emulator" "system-images;android-31;google_apis;x86_64"

      - name: Create Virtual Device
        run: |
          echo "no" | avdmanager create avd -n CloudAVD -k "system-images;android-31;google_apis;x86_64" --force

      - name: Install VNC Desktop & Web Streamer
        run: |
          sudo apt-get update
          sudo apt-get install -y xfce4 xfce4-goodies tightvncserver novnc websockify
          mkdir -p ~/.vnc
          echo "password123" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
      - name: Start Emulator & Stream to Web
        env:
          SUB_NAME: ${{ secrets.MY_SUBDOMAIN }}
        run: |
          # Start internal desktop server
          vncserver :1 -geometry 1280x720 -depth 24
          
          # Convert VNC stream into an HTML5 browser interface on port 6080
          /usr/share/novnc/utils/launch.sh --vnc localhost:5901 --listen 6080 &
          
          # Launch hardware-accelerated Android emulator
          DISPLAY=:1 $ANDROID_HOME/emulator/emulator -avd CloudAVD -no-audio -no-boot-anim -accel on -gpu swiftshader_indirect &
          
          # Securely assign your custom domain and keep the cloud runner alive
          ssh -R ${SUB_NAME}:80:localhost:6080 nokey@localhost.run
