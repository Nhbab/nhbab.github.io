name: Ultimate Android TV ARM Emulator
on: 
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  run-emulator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure Cloud Kernel Virtualization (KVM)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo chmod 666 /dev/kvm

      # SỬA LỖI 125: Ép xóa sạch mọi container rác hoặc container bị trùng tên từ phiên bản chạy trước
      - name: Clean Existing Docker Containers Cache
        run: |
          docker stop $(docker ps -aq) || true
          docker rm -f $(docker ps -aq) || true
          docker network rm cloud_phone_net || true

      - name: Setup and Authenticate Ngrok Agent
        run: |
          curl -sSOL --output-dir /tmp https://equinox.io
          sudo tar -xzf /tmp/ngrok-v3-stable-linux-amd64.tgz -C /usr/local/bin
          rm -f /tmp/ngrok-v3-stable-linux-amd64.tgz
          ngrok config add-authtoken rd_3FJNUZLuxuKSUetomzVf2PqUeHX

      - name: Deploy Pure Docker Architecture
        run: |
          # 1. Khởi tạo mạng nội bộ Docker sạch
          docker network create cloud_phone_net
          
          sudo modprobe ashmem_linux || true
          sudo modprobe binder_linux || true
          
          # 2. CONTAINER LÕI: Thêm cờ --rm để tự giải phóng vùng nhớ nếu xảy ra xung đột hệ thống
          docker run -d --privileged --name android_core \
            --network cloud_phone_net \
            --device /dev/kvm \
            redroid/redroid:11.0.0-latest \
            androidboot.hardware=redroid \
            androidboot.wlan.interface=wlan0 \
            redroid.width=1280 redroid.height=720 redroid.fps=30 redroid.density=320
            
          sleep 12
            
          # 3. CONTAINER ĐỒ HỌA VNC TRUYỀN HÌNH ẢNH
          docker run -d --name web_canvas \
            --network cloud_phone_net \
            -p 6080:80 \
            -e ADB_HOST=android_core \
            -e VNC_PASSWORD=password123 \
            sorccu/adb-vnc-server
          
          sleep 8

          # 4. Ép cài đặt TV Launcher qua môi trường kết nối nội bộ ADB
          docker exec -i web_canvas adb connect android_core:5555 || true
          sleep 2
          docker exec -i web_canvas wget -O /tmp/tv_launcher.apk https://github.com || true
          docker exec -i web_canvas adb install /tmp/tv_launcher.apk || true
          docker exec -i web_canvas adb shell cmd package set-home-activity com.tsynik.tvlauncher || true

          # 5. CONTAINER ĐƯỜNG TRUYỀN NGROK
          docker run -d --name ngrok_agent \
            --network cloud_phone_net \
            ngrok/ngrok:latest \
            http web_canvas:80 --token=rd_3FJNUZLuxuKSUetomzVf2PqUeHX --domain=banister-reopen-savings.ngrok-free.dev

      - name: Maintain Server Runtime Loop
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          (sleep 21000 && gh workflow run "Ultimate Android TV ARM Emulator" || true) & 
          
          echo "=== PURE ANDROID TV DOCKER EMULATOR IS ONLINE ==="
          while true; do
            docker ps
            sleep 60
          done
