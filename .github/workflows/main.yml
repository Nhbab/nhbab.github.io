name: Temp GTV14 Android TV (No Config)

on:
  workflow_dispatch:

jobs:
  run-temp-tv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install QEMU and Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils wget adb netpbm

      - name: Download GTV14 Android TV ISO
        run: |
          echo "Downloading GTV14 x86_64 ISO using browser emulation..."
          # Using curl with a Chrome browser user-agent bypasses the SourceForge 403 firewall
          curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -o gtv14_atv.iso \
            "https://downloads.sourceforge.net/project/androidtv-x86-64/GTV14/GTV14-x86_64-MRDTeam-V26T-260520.iso?ts=gAAAAABqNKI3177yBBdHqQsWOt747oDBhsLD_8oi50um_BIYhlvpXY_blf_fEW9bXND-RcAPRNp12tirUOZpsOrlnN_j_8GhKw%3D%3D&r=https%3A%2F%2Fsourceforge.net%2Fprojects%2Fandroidtv-x86-64%2Ffiles%2FGTV14%2FGTV14-x86_64-MRDTeam-V26T-260520.iso%2Fdownload"

      - name: Provision Storage Drive
        run: |
          qemu-img create -f qcow2 gtv14_disk.qcow2 12G

      - name: Launch GTV14 in QEMU (Headless Configuration)
        run: |
          echo "Starting QEMU without local GTK windows..."
          # Adding '-display none' stops the GTK window initialization crash
          sudo qemu-system-x86_64 \
            -enable-kvm \
            -cpu host \
            -m 4G \
            -smp 2 \
            -drive file=gtv14_disk.qcow2,format=qcow2 \
            -cdrom gtv14_atv.iso \
            -vga virtio \
            -display none \
            -vnc 127.0.0.1:0 \
            -net nic,model=virtio \
            -net user,hostfwd=tcp::5555-:5555 \
            -monitor unix:qemu_control.sock,server,nowait \
            -daemonize

      - name: Skip GRUB Boot Menu Automatically
        run: |
          sleep 5
          echo "Sending automated boot confirmation..."
          echo "sendkey ret" | nc -U qemu_control.sock


      - name: Setup Web Terminal Link
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: false
