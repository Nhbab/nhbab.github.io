name: Android TV 9 Fast 1 Hour VM

on:
  workflow_dispatch:

jobs:
  run-atv9-vm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install QEMU, noVNC, and Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils wget adb novnc websockify

      - name: Grant Runner Access to KVM Hardware Extensions
        run: |
          echo "Applying system group rules to bypass KVM kernel permissions..."
          sudo usermod -aG kvm $USER
          sudo chown $USER /dev/kvm

      - name: Download Android TV 9 ISO (Escape Brackets Bypass)
        run: |
          echo "Pulling clean direct 1.2GB ISO payload from Internet Archive servers..."
          curl -L -A "Mozilla/5.0" \
            -o "AndroidTV9-x64.iso" \
            "https://archive.org/download/androidtv-x86/AndroidTV9-x64-k5.18.0-arm-gapps-wifi6-%2807.02.23%29.iso"

      - name: Launch Android TV 9 in QEMU (Native ISO Drive Mounting)
        run: |
          echo "Starting accelerated QEMU container layout using native CD-ROM mounting..."
          # Replaced direct kernel parsing with native CD-ROM drive mounting so ARM and GApps files load properly
          qemu-system-x86_64 \
            -enable-kvm \
            -cpu host \
            -m 6G \
            -smp 4,cores=4,threads=1 \
            -drive file="AndroidTV9-x64.iso",media=cdrom,format=raw \
            -boot order=d \
            -vga std \
            -device virtio-mouse-pci \
            -device virtio-keyboard-pci \
            -display none \
            -audio none \
            -vnc 127.0.0.1:0 \
            -net nic,model=virtio \
            -net user,hostfwd=tcp::5555-:5555 \
            -monitor telnet:127.0.0.1:4444,server,nowait \
            -daemonize

      - name: Fast Automated Debug GUI Macro Boot Selection
        run: |
          echo "Waiting 12 seconds for the GRUB live boot options to process..."
          sleep 12
          
          echo "Injecting clean arrow adjustments to select Debug GUI Fallback mode..."
          python3 -c '
          import socket, time
          s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          s.connect(("127.0.0.1", 4444))
          time.sleep(0.5)
          
          # Move down twice to select the internal "Live CD - Debug Mode" profile entry
          s.sendall(b"sendkey down\n")
          time.sleep(0.5)
          s.sendall(b"sendkey down\n")
          time.sleep(0.5)
          
          # Press Enter to execute the target boot sequence
          s.sendall(b"sendkey ret\n")
          time.sleep(2.0)
          
          # When the initial text scrolling pauses, press Enter one more time to exit console mode and launch the GUI
          s.sendall(b"sendkey ret\n")
          s.close()
          '
          echo "Boot command executed successfully. Android TV 9 user interface is loading..."

      - name: Start Websockify (VNC to WebSockets)
        run: |
          websockify --web /usr/share/novnc/ 6080 127.0.0.1:5900 &
          sleep 2

      - name: Generate Public Remote Link and Hold for 1 Hour
        run: |
          echo "================================================================"
          echo "LAUNCHING AUTHENTICATED TUNNEL ENGINE OVER PORT 443..."
          echo "================================================================"
          
          # Stable connection tunnel using your premium token ID mapping config
          ssh -o StrictHostKeyChecking=no -p 443 -R 80:localhost:6080 RPLfy23ckPE+80@a.pinggy.io > pinggy.log 2>&1 &
          
          sleep 10
          
          echo "================================================================"
          echo "--> YOUR ONLINE VIRTUAL MACHINE REMOTE DETAILS <--"
          echo "================================================================"
          
          # Read the log file, find the generated web URL, and print it cleanly to the console
          grep -o 'https://[^ ]*\(pinggy.link\|pinggy.io\)' pinggy.log || cat pinggy.log
          
          echo ""
          echo "INSTRUCTIONS:"
          echo "1. Click the .pinggy.link URL printed directly above."
          echo "2. On the web page that opens, click on 'vnc.html'."
          echo "3. Use your computer keyboard ARROW KEYS to steer Up/Down/Left/Right!"
          echo "================================================================"
          
          # Keeps the workflow worker open for 60 full minutes
          sleep 3600
