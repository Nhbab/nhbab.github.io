name: Ubuntu GUI Virtual Machine

on: 
  workflow_dispatch: # Allows you to manually trigger the VM

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Ubuntu Desktop GUI and VNC Server
      run: |
        sudo apt-get update
        sudo apt-get install -y xfce4 xfce4-goodies vnc4server tightvncserver
        mkdir ~/.vnc
        echo "password123" | vncpasswd -f > ~/.vnc/passwd
        chmod 600 ~/.vnc/passwd

    - name: Set up Ngrok Tunnel
      run: |
        curl -s https://amazonaws.com | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/at/sources.list.d/ngrok.list
        sudo apt-get update && sudo apt-get install ngrok
        ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

    - name: Start VNC and Ngrok Tunnel
      run: |
        vncserver :1 -geometry 1280x800 -depth 24
        ngrok tcp 5901 --log=stdout &
        sleep 5
        curl --silent http://127.0.0 | jq '.tunnels[0].public_url'
        
    - name: Keep VM Alive
      run: sleep 21600 # Runs the machine for up to 6 hours
