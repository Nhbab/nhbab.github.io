name: Google TV 11 Fast 1 Hour VM

on:
  workflow_dispatch:

jobs:
  run-gtv11-vm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install QEMU, noVNC, and Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils wget adb novnc websockify

      - name: Grant Runner Access to KVM Hardware Extensions
        run: |
          echo "Applying system group rules to bypass KVM kernel permissions..."
          sudo usermod -aG kvm $USER
          sudo chown $USER /dev/kvm

      - name: Download GTV11 from Open Mirror Array (No Quota Blocks)
        run: |
          echo "Pulling GTV11 from direct global hardware node..."
          # Using specific direct mirror subdomains completely avoids Google Drive 403 / Quota blocks
          curl -L -A "Mozilla/5.0" \
            -o "GTV11-x86_64-MRDTeam-V24-250622.img" \
            "https://sourceforge.net" || \
          curl -L -A "Mozilla/5.0" \
            -o "GTV11-x86_64-MRDTeam-V24-250622.img" \
            "https://sourceforge.net"

      - name: Verify Downloaded Image Integrity
        run: |
          echo "Checking downloaded file size footprint..."
          # This must show around 1.2G to 1.5G, not 79K!
          ls -lh "GTV11-x86_64-MRDTeam-V24-250622.img"

      - name: Provision System Hard Drive
        run: |
          qemu-img create -f qcow2 gtv11_disk.qcow2 16G

      - name: Launch GTV11 (SATA IDE Drive Mapping Interface)
        run: |
          echo "Launching QEMU using native raw hard disk layout to bypass CD-ROM locks..."
          qemu-system-x86_64 \
            -enable-kvm \
            -cpu host \
            -m 6G \
            -smp 4,cores=4,threads=1 \
            -drive file=gtv11_disk.qcow2,format=qcow2,index=0,media=disk \
            -drive file=GTV11-x86_64-MRDTeam-V24-250622.img,if=ide,format=raw,index=1,media=disk \
            -boot order=c,menu=on \
            -vga virtio \
            -display none \
            -audio none \
            -vnc 127.0.0.1:0 \
            -net nic,model=virtio \
            -net user,hostfwd=tcp::5555-:5555 \
            -monitor telnet:127.0.0.1:4444,server,nowait \
            -daemonize

      - name: Automated GRUB Boot Key Injection (Live CD Mode)
        run: |
          echo "Waiting 12 seconds for the GRUB installation partition layout menu to initialize..."
          sleep 12
          
          echo "Injecting return key via Python socket interface to launch Live CD Mode..."
          python3 -c '
          import socket, time
          s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          s.connect(("127.0.0.1", 4444))
          time.sleep(0.5)
          s.sendall(b"\n\nsendkey ret\n")
          time.sleep(0.5)
          s.close()
          '
          echo "Boot command executed successfully. Google TV 11 is loading..."

      - name: Start Websockify (VNC to WebSockets)
        run: |
          websockify --web /usr/share/novnc/ 6080 127.0.0.1:5900 &
          sleep 2

      - name: Generate Public Remote Link and Hold for 1 Hour
        run: |
          echo "================================================================"
          echo "LAUNCHING AUTHENTICATED TUNNEL ENGINE OVER PORT 443..."
          echo "================================================================"
          
          ssh -o StrictHostKeyChecking=no -p 443 -R 80:localhost:6080 RPLfy23ckPE+80@a.pinggy.io > pinggy.log 2>&1 &
          
          sleep 10
          
          echo "================================================================"
          echo "--> YOUR ONLINE VIRTUAL MACHINE REMOTE DETAILS <--"
          echo "================================================================"
          
          grep -o 'https://[^ ]*\(pinggy.link\|pinggy.io\)' pinggy.log || cat pinggy.log
          
          echo ""
          echo "INSTRUCTIONS:"
          echo "1. Click the .pinggy.link URL printed directly above."
          echo "2. On the web page that opens, click on 'vnc.html'."
          echo "3. Use your computer keyboard ARROW KEYS to steer Up/Down/Left/Right!"
          echo "================================================================"
          
          sleep 3600
