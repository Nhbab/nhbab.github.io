name: Ultimate Android TV ARM Emulator
on: 
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  run-emulator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Maximize CPU Hardware Acceleration (KVM)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo chmod 666 /dev/kvm

      - name: Setup Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK Path
        uses: android-actions/setup-android@v3

      - name: Download Android TV Image
        run: |
          sdkmanager --update
          sdkmanager "emulator" "system-images;android-30;android-tv;x86"

      - name: Build Virtual TV Hardware Profile
        run: |
          mkdir -p ~/.android/avd/CloudAVD.avd/
          cat <<EOF > ~/.android/avd/CloudAVD.avd/config.ini
          hw.cpu.arch=x86
          hw.cpu.ncore=4
          hw.ramSize=4096
          hw.gpu.mode=host
          hw.gpu.enabled=yes
          vm.heapSize=512
          image.sysdir.1=system-images/android-30/android-tv/x86/
          tag.id=android-tv
          tag.display=Android TV
          hw.keyboard=yes
          hw.mainKeys=no
          hw.lcd.density=240
          hw.lcd.height=540
          hw.lcd.width=960
          EOF
          echo "path=/home/runner/.android/avd/CloudAVD.avd" > ~/.android/avd/CloudAVD.ini
          echo "target=android-30" >> ~/.android/avd/CloudAVD.ini

      - name: Install Secure Web Streamer (noVNC) & Audio Libraries
        run: |
          sudo apt-get update
          # FIXED CORE CRASH: Added libpulse0 and libgl1 dependencies explicitly
          sudo apt-get install -y xvfb x11vnc novnc websockify libpulse0 libgl1

      - name: Start TV Engine & Secure Network Pipe
        run: |
          # 1. Start a high-performance headless display server canvas layout
          Xvfb :1 -screen 0 960x540x16 &
          export DISPLAY=:1
          sleep 3
          
          # 2. Start a fast, direct VNC layer pipe binding
          x11vnc -display :1 -nopw -listen localhost -shared -forever &
          sleep 3
          
          # 3. Map proxy links to run the streaming tool natively
          python3 -m websockify --web /usr/share/novnc/ 6080 localhost:5900 &
          sleep 3
          
          # 4. Launches Android TV engine using absolute paths and explicitly disables audio backend links
          $ANDROID_HOME/emulator/emulator -avd CloudAVD -no-audio -no-sound -no-window -no-boot-anim -accel on -gpu swiftshader_indirect -cores 4 -memory 4096 -qemu -cpu host &
          sleep 15
          
          # 5. Continuous execution loop triggers next run before timeout thresholds
          (sleep 21000 && gh workflow run "Ultimate Android TV ARM Emulator") & 

          # 6. FIXED NETWORK: Uses a stable fallback broker tunnel that bypasses GitHub firewalls
          echo "=== CONNECTING ULTIMATE TV STREAM ==="
          while true; do
            ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=15 -y -R nhbabcloudtv99:80:localhost:6080 nokey@localhost.run || true
            sleep 5
          done
