name: Run Flagship Cloud Android Emulator
on: 
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  run-emulator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Maximize CPU Hardware Acceleration (KVM)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo chmod 666 /dev/kvm

      - name: Setup Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK Path
        uses: android-actions/setup-android@v3

      - name: Download High-Performance Android System
        run: |
          sdkmanager "emulator" "system-images;android-29;google_apis;x86_64"

      # FIXED: Force pipes 'no' to the hardware profile prompt and uses a safety wildcard path search
      - name: Build Virtual Device with Max RAM Allocation
        run: |
          echo "no" | avdmanager create avd -n CloudAVD -k "system-images;android-29;google_apis;x86_64" --force
          
          # Dynamic fallback finding: injects hardware tweaks into the actual created path
          CONF_PATH=$(find ~/.android/avd/ -name "config.ini")
          echo "Found configuration file at: $CONF_PATH"
          
          echo "hw.ramSize=4096" >> "$CONF_PATH"
          echo "hw.gpu.mode=host" >> "$CONF_PATH"
          echo "vm.heapSize=512" >> "$CONF_PATH"

      - name: Install VNC Desktop & Web Streamer
        run: |
          sudo apt-get update
          sudo apt-get install -y xfce4 xfce4-goodies tightvncserver novnc websockify
          mkdir -p ~/.vnc
          echo "password123" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd

      - name: Start Services & Persistent Network Pipe
        env:
          SUB_NAME: ${{ secrets.MY_SUBDOMAIN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # 1. Start internal desktop canvas
          vncserver :1 -geometry 1280x720 -depth 16
          
          # 2. Convert raw server display data into interactive web canvas streams
          /usr/share/novnc/utils/launch.sh --vnc localhost:5901 --listen 6080 &
          
          # 3. Boot flagship-tweaked Android emulator using all 4 multi-threaded cores
          DISPLAY=:1 emulator -avd CloudAVD -no-audio -no-boot-anim -accel on -gpu swiftshader_indirect -cores 4 -memory 4096 &
          
          # 4. Wait for system initialization
          sleep 15
          
          # 5. Automatically fires a new session 10 minutes prior to GitHub's 6-hour strict cutoff limit
          (sleep 21000 && gh workflow run "Run Flagship Cloud Android Emulator") & 

          # 6. Infinite fallback connection structure eliminates "exit 1" errors
          echo "=== CONNECTING SECURE TUNNEL ==="
          while true; do
            ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=15 -y -R ${SUB_NAME}:80:localhost:6080 nokey@localhost.run || true
            echo "Tunnel disconnected. Reconnecting in 5 seconds..."
            sleep 5
          done
