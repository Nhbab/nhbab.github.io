name: Android TV SDK macOS Widescreen VM

on:
  workflow_dispatch:

jobs:
  run-sdk-tv-macos:
    # Runs entirely on GitHub-hosted cloud architecture for free native hardware acceleration
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Android TV SDK and Build AVD
        run: |
          echo "Accepting licenses..."
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null
          
          echo "Downloading official Android TV 9 system image..."
          # FIXED: Switched package target string from x86_64 to x86 to match Google Repository lists
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "system-images;android-28;android-tv;x86" "emulator" "platform-tools"
          
          echo "Building virtual device with a large 720p TV viewport profile..."
          # FIXED: Updated the packaging locator flag here to reference the verified x86 build
          echo "no" | $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager create avd \
            --name "Android_TV_9" \
            --package "system-images;android-28;android-tv;x86" \
            --device "tv_720p" \
            --force

      - name: Install noVNC and Websockify via Homebrew
        run: |
          echo "Installing remote streaming tools..."
          brew install novnc websockify

      - name: Launch Android TV SDK Emulator (Hardware Accelerated hvf)
        run: |
          echo "Launching accelerated macOS hardware hypervisor pipeline..."
          # -accel hvf: Passes the emulation loop directly into Apple's native hardware engine for maximum speed
          # -gpu swiftshader_indirect: Ensures headless frame buffers compile with true color scaling properties
          $ANDROID_HOME/emulator/emulator -avd "Android_TV_9" \
            -no-window \
            -no-audio \
            -no-boot-anim \
            -gpu swiftshader_indirect \
            -vnc :0 \
            -accel hvf \
            -memory 3072 \
            -cores 3 &
          sleep 5

      - name: Start Websockify (VNC to WebSockets)
        run: |
          echo "Translating frame buffer display signals to browser port 6080..."
          /opt/homebrew/share/novnc/utils/websockify --web /opt/homebrew/share/novnc/ --heartbeat 10 6080 127.0.0.1:5900 &
          sleep 2

      - name: Generate Public Remote Link and Hold for 1 Hour
        run: |
          echo "================================================================"
          echo "LAUNCHING AUTHENTICATED TUNNEL ENGINE OVER PORT 443..."
          echo "================================================================"
          
          # Web tunnel connection utilizing your premium token ID mapping parameters over port 443
          ssh -o StrictHostKeyChecking=no -p 443 -R 80:localhost:6080 RPLfy23ckPE+80@a.pinggy.io > pinggy.log 2>&1 &
          
          sleep 12
          
          echo "================================================================"
          echo "--> YOUR GITHUB-HOSTED VIRTUAL MACHINE REMOTE DETAILS <--"
          echo "================================================================"
          
          # Extract and print out your clickable secure web access url link
          grep -o 'https://[^ ]*\(pinggy.link\|pinggy.io\)' pinggy.log || cat pinggy.log
          
          echo ""
          echo "INSTRUCTIONS:"
          echo "1. Click the .pinggy.link URL printed directly above."
          echo "2. On the web page that opens, click on 'vnc.html'."
          echo "3. Use your computer keyboard ARROW KEYS to steer Up/Down/Left/Right!"
          echo "================================================================"
          
          # Keeps the workflow worker open for 60 full minutes
          sleep 3600
