name: Android SDK TV 9 Ubuntu 1 Hour VM

on:
  workflow_dispatch:

jobs:
  run-sdk-tv-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Android SDK Components, Emulator Core, and System Image
        run: |
          echo "Installing SDK platform prerequisites..."
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null
          
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "emulator" "platform-tools" "platforms;android-28"
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "system-images;android-28;android-tv;x86"
          
          mkdir -p "$HOME/.android/avd"
          export ANDROID_AVD_HOME="$HOME/.android/avd"
          
          echo "no" | $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager create avd \
            --name "Android_TV_9" \
            --package "system-images;android-28;android-tv;x86" \
            --device "tv_720p" \
            --force

      - name: Install Display Buffers, X11VNC, and noVNC on Ubuntu
        run: |
          sudo apt-get update
          # Installed Xvfb (Virtual Screen), x11vnc (VNC engine), and scrcpy (Screen mirroring tool)
          sudo apt-get install -y xvfb x11vnc novnc websockify scrcpy

      - name: Initialize Virtual Display Server (Xvfb)
        run: |
          echo "Initializing headless X11 virtual display buffer layout on channel :1..."
          Xvfb :1 -screen 0 1280x720x24 &
          sleep 2

      - name: Launch Android SDK TV Emulator (Headless Soft-GPU Engine)
        run: |
          echo "Starting official Android TV emulator in software execution mode..."
          export ANDROID_AVD_HOME="$HOME/.android/avd"
          
          # Removed the broken '-vnc' flag entirely to prevent engine crashes
          $ANDROID_HOME/emulator/emulator -avd "Android_TV_9" \
            -no-window \
            -no-audio \
            -no-boot-anim \
            -gpu swiftshader_indirect \
            -memory 3072 \
            -cores 3 \
            -daemonize

      - name: Establish Native Stream Capture (scrcpy to Xvfb)
        run: |
          echo "Waiting 25 seconds for Android core OS kernel layers to initialize..."
          sleep 25
          
          echo "Connecting via local debugging layer..."
          adb wait-for-device
          
          echo "Binding emulator display buffer to virtual screen display pool..."
          # Forces scrcpy to pull the hardware screen and render it straight inside our headless X11 pool
          DISPLAY=:1 scrcpy --max-fps=30 --always-on-top --window-title="atv" &
          sleep 3

      - name: Initialize Network Streaming Ports
        run: |
          echo "Starting x11vnc server pointing to display channel :1..."
          # Creates a robust background VNC interface bound to port 5900
          x11vnc -display :1 -nopw -listen 127.0.0.1 -forever -bg
          sleep 2
          
          echo "Translating frame buffer display signals to browser port 6080..."
          websockify --web /usr/share/novnc/ --heartbeat 10 6080 127.0.0.1:5900 &
          sleep 2

      - name: Generate Public Remote Link and Hold for 1 Hour
        run: |
          echo "================================================================"
          echo "LAUNCHING AUTHENTICATED TUNNEL ENGINE OVER PORT 443..."
          echo "================================================================"
          
          ssh -o StrictHostKeyChecking=no -p 443 -R 80:localhost:6080 RPLfy23ckPE+80@a.pinggy.io > pinggy.log 2>&1 &
          
          sleep 12
          
          echo "================================================================"
          echo "--> YOUR GITHUB-HOSTED VIRTUAL MACHINE REMOTE DETAILS <--"
          echo "================================================================"
          
          grep -o 'https://[^ ]*\(pinggy.link\|pinggy.io\)' pinggy.log || cat pinggy.log
          
          echo ""
          echo "INSTRUCTIONS:"
          echo "1. Click the .pinggy.link URL printed directly above."
          echo "2. On the web page that opens, click on 'vnc.html'."
          echo "3. Use your computer keyboard ARROW KEYS to steer Up/Down/Left/Right!"
          echo "================================================================"
          
          sleep 3600
