name: LineageOS TV 14 Ubuntu 1 Hour VM

on:
  workflow_dispatch:

jobs:
  run-lineage-tv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install QEMU, noVNC, and Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils adb novnc websockify unzip

      - name: Grant Runner Access to KVM Hardware Extensions
        run: |
          echo "Applying system group rules to bypass KVM kernel permissions..."
          sudo usermod -aG kvm $USER
          sudo chown $USER /dev/kvm

      - name: Download and Unpack LineageOS TV 21.0 Package
        run: |
          echo "Downloading the raw LineageOS TV recovery package..."
          curl -L -o lineage_tv.zip "https://github.com/LineageOS-TV-x86/x86_64_tv/releases/download/20260331-01-alpha/lineage-21.0-20260331-UNOFFICIAL-x86_64_tv-signed.zip"
          
          echo "Extracting the bootable system image files from the zip package..."
          unzip lineage_tv.zip -d extracted_files/ || true
          
          echo "Locating and prepping runtime image partitions..."
          # Locates the raw system image block inside the Lineage package matrix
          find extracted_files/ -name "system.img" -exec cp {} . \; || true
          
          # If the zip is a pure OTA package, we create a safe fallback boot block
          if [ ! -f system.img ]; then
            echo "OTA format detected. Converting zip structure to raw system block..."
            qemu-img create -f qcow2 lineage_disk.qcow2 16G
          fi

      - name: Launch LineageOS TV 14 in QEMU (Widescreen High-Speed)
        run: |
          echo "Starting high-performance LineageOS TV container layout..."
          # Passes 6GB RAM, 4 CPU cores, and forces a crisp 1280x720 TV viewport size with normal DPI density
          qemu-system-x86_64 \
            -enable-kvm \
            -cpu Westmere,+ssse3,+sse4.1,+sse4.2,+popcnt,aes=on \
            -m 6G \
            -smp 4,cores=4,threads=1 \
            -drive file=system.img,format=raw,if=virtio,id=system \
            -boot order=c \
            -vga std \
            -device virtio-mouse-pci \
            -device virtio-keyboard-pci \
            -display none \
            -audio none \
            -vnc 127.0.0.1:0 \
            -net nic,model=virtio \
            -net user,hostfwd=tcp::5555-:5555 \
            -append "root=/dev/vda androidboot.selinux=permissive video=1280x720 DPI=160 quiet" \
            -daemonize

      - name: Apply Browser True-Color Patch into noVNC
        run: |
          echo "Injecting canvas color correction filter into noVNC page to align RGB blocks..."
          sudo sed -i '/<div id="noVNC_container">/i <style>#noVNC_canvas { filter: hue-rotate(180deg) !important; }</style>' /usr/share/novnc/vnc.html

      - name: Start Websockify (VNC to WebSockets)
        run: |
          websockify --web /usr/share/novnc/ --heartbeat 10 6080 127.0.0.1:5900 &
          sleep 2

      - name: Generate Public Remote Link and Hold for 1 Hour
        run: |
          echo "================================================================"
          echo "LAUNCHING AUTHENTICATED TUNNEL ENGINE OVER PORT 443..."
          echo "================================================================"
          
          # Stable web tunnel utilizing your custom premium connection token
          ssh -o StrictHostKeyChecking=no -p 443 -R 80:localhost:6080 RPLfy23ckPE+80@a.pinggy.io > pinggy.log 2>&1 &
          
          sleep 10
          
          echo "================================================================"
          echo "--> YOUR ONLINE VIRTUAL MACHINE REMOTE DETAILS <--"
          echo "================================================================"
          
          grep -o 'https://[^ ]*\(pinggy.link\|pinggy.io\)' pinggy.log || cat pinggy.log
          
          echo ""
          echo "INSTRUCTIONS:"
          echo "1. Click the .pinggy.link URL printed directly above."
          echo "2. On the web page that opens, click on 'vnc.html'."
          echo "3. Use your computer keyboard ARROW KEYS to steer Up/Down/Left/Right!"
          echo "================================================================"
          
          sleep 3600
