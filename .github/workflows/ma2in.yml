name: Android TV SDK macOS Widescreen VM

on:
  workflow_dispatch:

jobs:
  run-sdk-tv-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Android TV SDK and Build AVD
        run: |
          echo "Accepting licenses..."
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null
          
          echo "Downloading official Android TV 9 system image..."
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "system-images;android-28;android-tv;x86" "emulator" "platform-tools"
          
          echo "Building virtual device with a large 720p TV viewport profile..."
          echo "no" | $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager create avd \
            --name "Android_TV_9" \
            --package "system-images;android-28;android-tv;x86" \
            --device "tv_720p" \
            --force

      - name: Install noVNC and Python Websockify (PEP 668 Bypass Included)
        run: |
          echo "Installing websockify via native Python pip pipeline..."
          # FIXED: Appended --break-system-packages to cleanly bypass macOS PEP 668 global user space restrictions
          pip3 install websockify --break-system-packages
          
          echo "Downloading standalone noVNC web runtime package..."
          curl -L -o novnc.tar.gz https://github.com
          tar -xzf novnc.tar.gz
          mv noVNC-1.5.0 novnc_web_root
          
          echo "Injecting fallback index layout components..."
          cp novnc_web_root/vnc.html novnc_web_root/index.html

      - name: Launch Android TV SDK Emulator (Hardware Accelerated hvf)
        run: |
          echo "Launching accelerated macOS hardware hypervisor pipeline..."
          $ANDROID_HOME/emulator/emulator -avd "Android_TV_9" \
            -no-window \
            -no-audio \
            -no-boot-anim \
            -gpu swiftshader_indirect \
            -vnc :0 \
            -accel hvf \
            -memory 3072 \
            -cores 3 &
          sleep 5

      - name: Start Websockify pointing to Local Web Root
        run: |
          echo "Translating display signal channels over to network port 6080..."
          python3 -m websockify --web ./novnc_web_root/ --heartbeat 10 6080 127.0.0.1:5900 &
          sleep 2

      - name: Generate Public Remote Link and Hold for 1 Hour
        run: |
          echo "================================================================"
          echo "LAUNCHING AUTHENTICATED TUNNEL ENGINE OVER PORT 443..."
          echo "================================================================"
          
          ssh -o StrictHostKeyChecking=no -p 443 -R 80:localhost:6080 RPLfy23ckPE+80@a.pinggy.io > pinggy.log 2>&1 &
          
          sleep 12
          
          echo "================================================================"
          echo "--> YOUR GITHUB-HOSTED VIRTUAL MACHINE REMOTE DETAILS <--"
          echo "================================================================"
          
          grep -o 'https://[^ ]*\(pinggy.link\|pinggy.io\)' pinggy.log || cat pinggy.log
          
          echo ""
          echo "INSTRUCTIONS:"
          echo "1. Click the .pinggy.link URL printed directly above."
          echo "2. On the web page that opens, click on 'vnc.html' or let it auto-load."
          echo "3. Use your computer keyboard ARROW KEYS to steer Up/Down/Left/Right!"
          echo "================================================================"
          
          sleep 3600
